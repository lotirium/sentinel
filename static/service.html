<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PriceAI — Intelligent Price Prediction</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0f172a;
  --card:    #1e293b;
  --card2:   #263348;
  --border:  #334155;
  --text:    #f1f5f9;
  --muted:   #94a3b8;
  --dim:     #64748b;
  --indigo:  #6366f1;
  --sky:     #38bdf8;
  --green:   #22c55e;
  --red:     #ef4444;
  --amber:   #f59e0b;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 15px;
}

html, body { min-height: 100vh; background: var(--bg); color: var(--text); }

/* ── FULL-SCREEN ERROR OVERLAY ───────────────────────────────────────────── */
#error-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: #0a0f1a;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .4s ease;
}
#error-overlay.show { opacity: 1; pointer-events: all; }

.eo-box {
  max-width: 560px; width: 100%; padding: 0 2rem;
  display: flex; flex-direction: column; align-items: center;
  text-align: center;
}

.eo-code {
  font-size: 6rem; font-weight: 900; letter-spacing: -.06em;
  line-height: 1; color: #ef4444;
  text-shadow: 0 0 60px rgba(239,68,68,.4);
  margin-bottom: .5rem;
  font-variant-numeric: tabular-nums;
}
.eo-title {
  font-size: 1.5rem; font-weight: 700; color: #fca5a5;
  margin-bottom: .75rem; letter-spacing: -.02em;
}
.eo-sub {
  font-size: .9rem; color: var(--muted);
  line-height: 1.65; margin-bottom: 1.5rem;
}
.eo-trace {
  width: 100%; background: rgba(239,68,68,.07);
  border: 1px solid rgba(239,68,68,.25); border-radius: 12px;
  padding: 1rem 1.25rem; margin-bottom: 1.5rem;
  font-family: monospace; font-size: .75rem;
  color: #fca5a5; line-height: 1.7;
  text-align: left; white-space: pre-wrap;
}
.eo-sentinel {
  display: flex; align-items: center; gap: .6rem;
  font-size: .82rem; color: var(--muted);
  background: rgba(99,102,241,.08); border: 1px solid rgba(99,102,241,.2);
  border-radius: 10px; padding: .7rem 1.1rem; margin-bottom: 1.5rem;
  width: 100%;
}
.eo-sentinel-icon { font-size: 1.1rem; flex-shrink: 0; }
.eo-sentinel-text { flex: 1; text-align: left; line-height: 1.5; }
.eo-sentinel-text strong { color: #a5b4fc; }
.eo-dash-link {
  display: inline-flex; align-items: center; gap: .4rem;
  color: #818cf8; border: 1px solid rgba(99,102,241,.35);
  border-radius: 8px; padding: .45rem 1rem;
  font-size: .8rem; font-weight: 600; text-decoration: none;
  transition: all .15s; margin-bottom: 1.5rem;
}
.eo-dash-link:hover { background: rgba(99,102,241,.12); }
.eo-retry {
  font-size: .72rem; color: var(--dim);
  font-variant-numeric: tabular-nums;
}

.eo-restored-icon { font-size: 4rem; margin-bottom: .75rem; animation: pop .4s cubic-bezier(.34,1.56,.64,1); }
@keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.eo-restored-title { font-size: 1.6rem; font-weight: 800; color: #4ade80; margin-bottom: .6rem; letter-spacing: -.03em; }
.eo-restored-sub   { font-size: .9rem; color: var(--muted); line-height: 1.65; margin-bottom: 1.5rem; }
.eo-continue-btn {
  padding: .65rem 1.75rem;
  background: linear-gradient(135deg, #16a34a, #22c55e);
  color: #fff; font-size: .9rem; font-weight: 700;
  border: none; border-radius: 10px; cursor: pointer;
  box-shadow: 0 4px 20px rgba(34,197,94,.4);
  transition: opacity .15s, transform .1s;
}
.eo-continue-btn:hover { opacity: .9; transform: translateY(-1px); }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── HEADER ─────────────────────────────────────────────────────────────── */
nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center;
  padding: 0 2.5rem; height: 60px;
  background: rgba(15,23,42,.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  gap: .75rem;
}
.nav-logo { display: flex; align-items: center; gap: .6rem; font-weight: 800; font-size: 1.1rem; }
.nav-logo-icon {
  width: 32px; height: 32px; border-radius: 9px;
  background: linear-gradient(135deg, #4f46e5, #818cf8);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  box-shadow: 0 0 16px rgba(99,102,241,.5);
}
.nav-logo em { color: #818cf8; font-style: normal; }
.nav-spacer  { flex: 1; }
.nav-pill {
  font-size: .72rem; font-weight: 700; letter-spacing: .06em;
  padding: .22rem .7rem; border-radius: 99px;
  border: 1px solid var(--border); color: var(--muted);
  transition: all .3s; display: flex; align-items: center; gap: .4rem;
}
.nav-pill .np-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,.8); transition: all .3s; }
.nav-pill.down .np-dot { background: var(--red); box-shadow: 0 0 6px rgba(239,68,68,.8); animation: pulse 1s infinite; }
.nav-pill.ok   { color: var(--green); border-color: rgba(34,197,94,.4); }
.nav-pill.down { color: var(--red);   border-color: rgba(239,68,68,.4); }

.nav-dash-link {
  font-size: .75rem; font-weight: 600; color: var(--muted);
  text-decoration: none; border: 1px solid var(--border);
  border-radius: 7px; padding: .28rem .75rem;
  transition: all .15s; display: flex; align-items: center; gap: .35rem;
}
.nav-dash-link:hover { color: var(--indigo); border-color: var(--indigo); }

/* ── LANGUAGE SWITCHER ───────────────────────────────────────────────────── */
.lang-switcher {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.lang-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: .7rem;
  font-weight: 700;
  letter-spacing: .06em;
  padding: .28rem .65rem;
  cursor: pointer;
  transition: all .15s;
}
.lang-btn.active { background: rgba(99,102,241,.15); color: var(--text); }
.lang-btn:hover:not(.active) { color: var(--text); }

/* ── HERO ────────────────────────────────────────────────────────────────── */
.hero {
  text-align: center;
  padding: 5rem 2rem 3rem;
  background: radial-gradient(ellipse 900px 400px at 50% -60px, rgba(99,102,241,.18) 0%, transparent 70%);
}
.hero-badge {
  display: inline-flex; align-items: center; gap: .45rem;
  background: rgba(99,102,241,.12); border: 1px solid rgba(99,102,241,.3);
  border-radius: 99px; padding: .3rem .9rem;
  font-size: .72rem; font-weight: 700; letter-spacing: .06em;
  color: #a5b4fc; margin-bottom: 1.5rem;
}
.hero h1 {
  font-size: 3rem; font-weight: 800; letter-spacing: -.04em;
  line-height: 1.15; margin-bottom: 1rem;
  background: linear-gradient(135deg, #f1f5f9 30%, #a5b4fc 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero p { font-size: 1.1rem; color: var(--muted); max-width: 520px; margin: 0 auto 2.5rem; line-height: 1.7; }

/* ── MAIN CARD ───────────────────────────────────────────────────────────── */
.page-wrap { max-width: 680px; margin: 0 auto; padding: 0 1.5rem 5rem; }

.predict-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 25px 60px rgba(0,0,0,.4);
}

.card-hd {
  padding: 1.6rem 1.8rem 1.2rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: .75rem;
}
.card-hd-icon {
  width: 38px; height: 38px; border-radius: 10px;
  background: linear-gradient(135deg, rgba(99,102,241,.3), rgba(129,140,248,.15));
  border: 1px solid rgba(99,102,241,.3);
  display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
}
.card-hd-text { flex: 1; }
.card-hd-title { font-size: 1rem; font-weight: 700; }
.card-hd-sub   { font-size: .78rem; color: var(--muted); margin-top: .1rem; }

/* ── SLIDERS ─────────────────────────────────────────────────────────────── */
.sliders { padding: 1.5rem 1.8rem; display: flex; flex-direction: column; gap: 1.2rem; }

.slider-row { display: flex; flex-direction: column; gap: .45rem; }
.slider-header { display: flex; justify-content: space-between; align-items: center; }
.slider-label  { font-size: .82rem; font-weight: 600; color: var(--text); }
.slider-value  {
  font-size: .82rem; font-weight: 700; font-variant-numeric: tabular-nums;
  color: #818cf8; background: rgba(99,102,241,.12);
  border: 1px solid rgba(99,102,241,.25); border-radius: 6px;
  padding: .08rem .45rem; min-width: 2.8rem; text-align: center;
  transition: color .2s;
}
input[type=range] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 5px;
  background: var(--border); border-radius: 99px; outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--indigo); border: 2px solid #818cf8;
  cursor: pointer; transition: transform .1s;
  box-shadow: 0 0 8px rgba(99,102,241,.6);
}
input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
.slider-desc { font-size: .72rem; color: var(--dim); }

/* ── SUBMIT ──────────────────────────────────────────────────────────────── */
.card-footer { padding: 0 1.8rem 1.8rem; }

#predict-btn {
  width: 100%; padding: .9rem 2rem;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  color: #fff; font-size: .95rem; font-weight: 700; letter-spacing: .01em;
  border: none; border-radius: 12px; cursor: pointer;
  transition: opacity .15s, transform .12s, box-shadow .2s;
  box-shadow: 0 4px 20px rgba(79,70,229,.45);
  display: flex; align-items: center; justify-content: center; gap: .6rem;
}
#predict-btn:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); box-shadow: 0 6px 28px rgba(79,70,229,.55); }
#predict-btn:active:not(:disabled) { transform: translateY(0); }
#predict-btn:disabled { opacity: .45; cursor: not-allowed; }

/* ── RESULT PANEL ────────────────────────────────────────────────────────── */
#result-panel {
  margin: 1.25rem 1.8rem 1.8rem;
  border-radius: 14px;
  overflow: hidden;
  display: none;
  animation: resultIn .35s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes resultIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
#result-panel.show { display: block; }

.result-ok {
  background: linear-gradient(135deg, rgba(34,197,94,.12) 0%, rgba(34,197,94,.05) 100%);
  border: 1px solid rgba(34,197,94,.3); padding: 1.4rem 1.5rem;
}
.result-ok-top    { display: flex; align-items: center; gap: .6rem; margin-bottom: .9rem; }
.result-ok-badge  { font-size: .68rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--green); background: rgba(34,197,94,.12); border: 1px solid rgba(34,197,94,.3); border-radius: 99px; padding: .18rem .6rem; }
.result-value {
  font-size: 3.2rem; font-weight: 800; letter-spacing: -.04em;
  color: #4ade80; line-height: 1; margin-bottom: .35rem;
  font-variant-numeric: tabular-nums;
}
.result-label { font-size: .82rem; color: var(--muted); margin-bottom: 1rem; }
.result-meta  { display: flex; gap: 1.5rem; }
.result-meta-item { }
.result-meta-val { font-size: .88rem; font-weight: 700; color: var(--text); }
.result-meta-lbl { font-size: .68rem; color: var(--dim); text-transform: uppercase; letter-spacing: .06em; margin-top: .05rem; }

.result-err {
  background: linear-gradient(135deg, rgba(239,68,68,.12) 0%, rgba(239,68,68,.05) 100%);
  border: 1px solid rgba(239,68,68,.35); padding: 1.4rem 1.5rem;
}
.result-err-top   { display: flex; align-items: center; gap: .65rem; margin-bottom: .8rem; }
.result-err-icon  { font-size: 1.5rem; }
.result-err-title { font-size: 1rem; font-weight: 700; color: #fca5a5; }
.result-err-sub   { font-size: .78rem; color: var(--muted); margin-top: .15rem; }
.result-err-trace {
  background: rgba(0,0,0,.35); border: 1px solid rgba(239,68,68,.2);
  border-radius: 8px; padding: .75rem 1rem;
  font-family: monospace; font-size: .72rem; color: #fca5a5;
  line-height: 1.6; margin: .8rem 0; white-space: pre-wrap;
}
.result-err-notify { font-size: .75rem; color: var(--dim); display: flex; align-items: center; gap: .4rem; margin-top: .6rem; }

.retry-btn {
  margin-top: 1rem; padding: .5rem 1.2rem;
  background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.3);
  color: #fca5a5; font-size: .78rem; font-weight: 600;
  border-radius: 8px; cursor: pointer; transition: all .15s;
}
.retry-btn:hover { background: rgba(239,68,68,.25); }

/* ── HOW IT WORKS ────────────────────────────────────────────────────────── */
.features-section { margin-top: 3rem; }
.section-title { font-size: 1.4rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: 1.5rem; text-align: center; }
.feature-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
.feature-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 1.25rem;
  transition: border-color .2s;
}
.feature-card:hover { border-color: rgba(99,102,241,.4); }
.feature-card-icon { font-size: 1.5rem; margin-bottom: .7rem; }
.feature-card-title { font-size: .88rem; font-weight: 700; margin-bottom: .35rem; }
.feature-card-desc  { font-size: .76rem; color: var(--muted); line-height: 1.55; }

/* ── FOOTER ──────────────────────────────────────────────────────────────── */
footer {
  border-top: 1px solid var(--border); padding: 1.5rem 2.5rem;
  display: flex; align-items: center; justify-content: space-between;
  font-size: .75rem; color: var(--dim);
}
.footer-logo { display: flex; align-items: center; gap: .4rem; font-weight: 700; color: var(--muted); }

/* Loading spinner */
.spinner {
  width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
  animation: spin .7s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

// ── LANGUAGE HELPERS ──────────────────────────────────────────────────────
let lang = 'en';

function T(key, ...args) {
  const v = LANG[lang][key];
  if (typeof v === 'function') return v(...args);
  return v !== undefined ? v : (LANG.en[key] || key);
}

function applyTranslations() {
  // Update <title>
  document.title = T('pageTitle');
  // Static text nodes
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = LANG[lang][el.dataset.i18n];
    if (v !== undefined) el.textContent = v;
  });
  // Nodes that need innerHTML
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const v = LANG[lang][el.dataset.i18nHtml];
    if (v !== undefined) el.innerHTML = v;
  });
  // Footer center (contains a link so needs innerHTML)
  const fc = document.getElementById('footer-center');
  if (fc) fc.innerHTML = T('footerCenter');
  // Button text
  const bt = document.getElementById('btn-text');
  if (bt && bt.textContent !== T('btnAnalysing')) bt.textContent = T('btnPredict');
  // Rebuild sliders and feature cards in the new language
  buildSliders();
  buildFeatureCards();
}

function setLang(l) {
  lang = l;
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('btn-ru').classList.toggle('active', l === 'ru');
  applyTranslations();
}

// ── RENDER SLIDERS ────────────────────────────────────────────────────────
function buildSliders() {
  const area     = document.getElementById('sliders-area');
  const features = LANG[lang].features;
  // Preserve current slider values across language switches
  const saved = {};
  features.forEach(f => {
    const el = document.getElementById('slider-' + f.id);
    if (el) saved[f.id] = el.value;
  });
  area.innerHTML = features.map(f => `
    <div class="slider-row">
      <div class="slider-header">
        <span class="slider-label">${esc(f.label)}</span>
        <span class="slider-value" id="val-${f.id}">${(+(saved[f.id] || f.value)).toFixed(1)}</span>
      </div>
      <input type="range" id="slider-${f.id}" min="0" max="10" step="0.1"
             value="${saved[f.id] || f.value}"
             oninput="updateSlider('${f.id}', this.value)">
      <span class="slider-desc">${esc(f.desc)}</span>
    </div>
  `).join('');
}

// ── RENDER FEATURE CARDS ──────────────────────────────────────────────────
function buildFeatureCards() {
  const grid  = document.getElementById('feature-grid');
  const cards = LANG[lang].featureCards;
  grid.innerHTML = cards.map(c => `
    <div class="feature-card">
      <div class="feature-card-icon">${c.icon}</div>
      <div class="feature-card-title">${esc(c.title)}</div>
      <div class="feature-card-desc">${esc(c.desc)}</div>
    </div>
  `).join('');
}

function updateSlider(id, val) {
  const el = document.getElementById('val-' + id);
  if (el) el.textContent = parseFloat(val).toFixed(1);
}

function getFeatureValues() {
  return LANG[lang].features.map(f => {
    const el = document.getElementById('slider-' + f.id);
    return el ? parseFloat(el.value) : f.value;
  });
}

// ── PREDICTION ────────────────────────────────────────────────────────────
async function runPrediction() {
  const btn   = document.getElementById('predict-btn');
  const icon  = document.getElementById('btn-icon');
  const text  = document.getElementById('btn-text');
  const panel = document.getElementById('result-panel');

  btn.disabled = true;
  icon.outerHTML = '<div class="spinner" id="btn-icon"></div>';
  text.textContent = T('btnAnalysing');
  panel.classList.remove('show');

  const features = getFeatureValues();
  const t0 = Date.now();

  try {
    const res  = await fetch('/predict', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ features }),
    });
    const ms   = Date.now() - t0;
    const data = await res.json();
    if (res.ok) showSuccess(data, ms);
    else        showError(data, ms);
  } catch (e) {
    showError({ detail: { error: 'NetworkError', message: 'Could not reach the prediction service.' } }, 0);
  } finally {
    btn.disabled = false;
    document.getElementById('btn-icon').outerHTML = '<span id="btn-icon">🔮</span>';
    text.textContent = T('btnPredict');
  }
}

function showSuccess(data, ms) {
  const panel = document.getElementById('result-panel');
  const score = data.prediction !== undefined ? data.prediction : '—';
  const n     = data.feature_count || 4;
  panel.innerHTML = `
    <div class="result-ok">
      <div class="result-ok-top">
        <div class="result-ok-badge">${esc(T('resultBadge'))}</div>
      </div>
      <div class="result-value">${typeof score === 'number' ? score.toFixed(2) : score}</div>
      <div class="result-label">${esc(T('resultLabel', n))}</div>
      <div class="result-meta">
        <div class="result-meta-item">
          <div class="result-meta-val">${esc(T('resultConfidence'))}</div>
          <div class="result-meta-lbl">${esc(T('confidenceLabel'))}</div>
        </div>
        <div class="result-meta-item">
          <div class="result-meta-val">${ms} ms</div>
          <div class="result-meta-lbl">${esc(T('latencyLabel'))}</div>
        </div>
        <div class="result-meta-item">
          <div class="result-meta-val">${n}</div>
          <div class="result-meta-lbl">${esc(T('factorsLabel'))}</div>
        </div>
      </div>
    </div>`;
  panel.classList.add('show');
}

function showError(data, ms) {
  const panel = document.getElementById('result-panel');
  const d = (data.detail && typeof data.detail === 'object') ? data.detail : { error: 'Error', message: data.detail || 'Unknown error' };
  const trace = d.file
    ? `${d.error}: ${d.message}\n\nFile: ${d.file}, line ${d.line}\nCode: ${d.code}\nCause: ${d.cause}`
    : `${d.error || 'Error'}: ${d.message || JSON.stringify(d)}`;
  panel.innerHTML = `
    <div class="result-err">
      <div class="result-err-top">
        <div class="result-err-icon">❌</div>
        <div>
          <div class="result-err-title">${esc(T('resultErrTitle'))}</div>
          <div class="result-err-sub">${esc(T('resultErrSub'))}</div>
        </div>
      </div>
      <pre class="result-err-trace">${esc(trace)}</pre>
      <div class="result-err-notify">${esc(T('resultErrNotify'))}</div>
      <button class="retry-btn" onclick="runPrediction()">${esc(T('retryBtn'))}</button>
    </div>`;
  panel.classList.add('show');
}

// ── HEALTH CHECK & ERROR OVERLAY ─────────────────────────────────────────
let wasDown        = false;
let retryCountdown = 3;

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setNavPill(ok) {
  const p = document.getElementById('nav-pill');
  const l = document.getElementById('nav-pill-label');
  const f = document.getElementById('footer-status');
  if (ok) {
    if (p) p.className = 'nav-pill ok';
    if (l) l.textContent = T('navOk');
    if (f) f.textContent = T('footerHealthy');
  } else {
    if (p) p.className = 'nav-pill down';
    if (l) l.textContent = T('navDown');
    if (f) f.textContent = T('footerIncident');
  }
}

function showErrorOverlay(errorData, pipelineLocked) {
  const overlay = document.getElementById('error-overlay');
  const box     = document.getElementById('eo-box');

  if (pipelineLocked && !errorData) {
    box.innerHTML = `
      <div class="eo-code" style="color:#f59e0b;text-shadow:0 0 60px rgba(245,158,11,.4)">503</div>
      <div class="eo-title" style="color:#fcd34d">${esc(T('eo503Title'))}</div>
      <div class="eo-sub">${esc(T('eo503Sub'))}</div>
      <div class="eo-sentinel">
        <div class="eo-sentinel-icon">🛡</div>
        <div class="eo-sentinel-text">
          <strong>CodeSentinel AI</strong> ${esc(T('eoSentinel503'))}
        </div>
      </div>
      <a class="eo-dash-link" href="/" target="_blank">${esc(T('eoDash503'))}</a>
      <div class="eo-retry" id="eo-retry">${T('eoRetry', retryCountdown)}</div>`;
  } else {
    const d = (errorData?.detail && typeof errorData.detail === 'object')
      ? errorData.detail
      : { error: 'InternalServerError', message: String(errorData?.detail || 'Service unavailable'), file: 'main.py', line: '?', code: '—', cause: '—' };
    const trace =
      `${d.error}: ${d.message}\n\n` +
      `File : ${d.file || 'main.py'}, line ${d.line || '?'}\n` +
      `Code : ${d.code  || '—'}\n` +
      `Cause: ${d.cause || '—'}`;
    box.innerHTML = `
      <div class="eo-code">500</div>
      <div class="eo-title">${esc(T('eo500Title'))}</div>
      <div class="eo-sub">${esc(T('eo500Sub'))}</div>
      <pre class="eo-trace">${esc(trace)}</pre>
      <div class="eo-sentinel">
        <div class="eo-sentinel-icon">🛡</div>
        <div class="eo-sentinel-text">
          <strong>CodeSentinel AI</strong> ${esc(T('eoSentinel500'))}
        </div>
      </div>
      <a class="eo-dash-link" href="/" target="_blank">${esc(T('eoDash500'))}</a>
      <div class="eo-retry" id="eo-retry">${T('eoRetry', retryCountdown)}</div>`;
  }

  overlay.classList.add('show');
  setNavPill(false);
}

function showRestoredOverlay() {
  const box = document.getElementById('eo-box');
  box.innerHTML = `
    <div class="eo-restored-icon">🎉</div>
    <div class="eo-restored-title">${esc(T('eoRestoredTitle'))}</div>
    <div class="eo-restored-sub">${esc(T('eoRestoredSub'))}</div>
    <button class="eo-continue-btn" onclick="hideOverlay()">${esc(T('eoContinueBtn'))}</button>`;
}

function hideOverlay() {
  document.getElementById('error-overlay').classList.remove('show');
  setNavPill(true);
}

function tickRetry() {
  retryCountdown--;
  const el = document.getElementById('eo-retry');
  if (el) el.textContent = T('eoRetry', retryCountdown);
  if (retryCountdown <= 0) {
    retryCountdown = 3;
    checkHealth();
  }
}

async function checkHealth() {
  try {
    const [predictRes, statusRes] = await Promise.all([
      fetch('/predict', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ features: [] }),
      }),
      fetch('/service-status'),
    ]);

    const predictOk = predictRes.ok;
    const locked    = (await statusRes.json()).locked;

    if (predictOk && !locked) {
      if (wasDown) {
        showRestoredOverlay();
        setTimeout(hideOverlay, 4000);
      } else {
        hideOverlay();
      }
      wasDown = false;
    } else {
      const errorData = predictOk ? null : await predictRes.json();
      wasDown = true;
      showErrorOverlay(errorData, locked);
      retryCountdown = 3;
    }
  } catch (_) {
    wasDown = true;
    showErrorOverlay(null, false);
    retryCountdown = 3;
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────
applyTranslations();   // populate all static strings
checkHealth();         // initial health check
setInterval(tickRetry, 1000);
</script>
